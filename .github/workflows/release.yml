name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux and Windows binaries
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          v="${VERSION#v}"
          mkdir -p dist
          for pair in linux:amd64 linux:arm64; do
            goos="${pair%%:*}"
            goarch="${pair#*:}"
            out="dist/goports-${v}-${goos}-${goarch}"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w -X github.com/user/goports/internal/version.Version=${v}" -o "$out" .
          done
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w -X github.com/user/goports/internal/version.Version=${v}" -o "dist/goports-${v}-windows-amd64.exe" .

      - uses: actions/upload-artifact@v4
        with:
          name: goports-release-linux-win
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build macOS binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          v="${VERSION#v}"
          mkdir -p dist
          for goarch in amd64 arm64; do
            GOARCH="$goarch" CGO_ENABLED=1 go build -trimpath -ldflags="-s -w -X github.com/user/goports/internal/version.Version=${v}" -o "dist/goports-${v}-darwin-${goarch}" .
          done

      - uses: actions/upload-artifact@v4
        with:
          name: goports-release-macos
          path: dist/*

  publish:
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: goports-release-*
          path: dist
          merge-multiple: true

      - name: SHA256 checksums
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum goports-* > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/goports-*
            dist/checksums.txt
